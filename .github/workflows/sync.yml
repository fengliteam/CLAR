name: Sync from Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check if running in main repository
        run: |
          if [ "${{ github.repository }}" = "CLRA-org/clra" ]; then
            echo "🛑 This is the main repository. Syncing is not needed. Exiting."
            exit 0
          fi

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up upstream
        run: git remote add upstream https://github.com/CLRA-org/clra.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into main and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          git merge upstream/main
          git push origin main