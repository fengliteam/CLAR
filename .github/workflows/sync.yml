name: Sync from Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Check if main repo
        run: |
          if [ "${{ github.repository }}" = "CLRA-org/clra" ]; then
            echo "Main repo, no sync."
            exit 0
          fi
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Setup upstream
        run: git remote add upstream https://github.com/CLRA-org/clra.git
      - name: Fetch
        run: git fetch upstream
      - name: Force push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          git reset --hard upstream/main
          git push origin main --force