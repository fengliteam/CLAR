name: Sync from Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write       # 允许创建 PR

    steps:
      - name: Check if running in main repository
        run: |
          if [ "${{ github.repository }}" = "CLRA-org/clra" ]; then
            echo "🛑 This is the main repository. Syncing is not needed. Exiting."
            exit 0
          fi

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up upstream
        run: git remote add upstream https://github.com/CLRA-org/clra.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Try merge and handle conflict
        id: merge
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          if git merge --no-commit --no-ff upstream/main; then
            echo "✅ Merge successful, pushing..."
            git commit -m "Auto-merge from upstream"
            git push origin main
            echo "merged=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Merge conflict detected."
            git merge --abort
            echo "merged=false" >> $GITHUB_OUTPUT
          fi

      - name: Create conflict PR
        if: steps.merge.outputs.merged == 'false'
        run: |
          BRANCH="sync/conflict-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          git merge upstream/main --no-edit || true   # 强制合并，保留冲突标记
          git add .
          git commit -m "Merge upstream (with conflicts)" || true
          git push origin $BRANCH --force

          # 用 GitHub CLI 创建 PR（无需额外脚本）
          gh pr create \
            --base main \
            --head $BRANCH \
            --title "⚠️ 上游合并冲突 - $(date +%Y-%m-%d)" \
            --body "自动同步上游仓库 \`CLRA-org/clra\` 时出现冲突。
          
          **请手动解决以下冲突文件**，然后合并此 PR：
          - \`git checkout $BRANCH\`
          - \`git merge upstream/main\`
          - 解决冲突后推送。

          工作流运行：[查看详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}