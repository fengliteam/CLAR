name: Sync from Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check if main repo
        run: |
          if [ "${{ github.repository }}" = "CLRA-org/clra" ]; then
            echo "Main repo, exit."
            exit 0
          fi

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup upstream
        run: git remote add upstream https://github.com/CLRA-org/clra.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge or prepare conflict branch
        id: merge
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git checkout main
          if git merge --no-commit --no-ff upstream/main; then
            git commit -m "Auto-merge from upstream"
            git push origin main
            echo "conflict=false" >> $GITHUB_OUTPUT
          else
            git merge --abort
            echo "conflict=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch with conflicts
        if: steps.merge.outputs.conflict == 'true'
        run: |
          BRANCH="sync/conflict-$(date +%Y%m%d-%H%M)"
          git checkout -b $BRANCH
          git merge upstream/main --no-edit || true
          git add .
          git commit -m "Merge upstream (with conflicts)" || true
          git push origin $BRANCH --force

      - name: Create Pull Request for conflict
        if: steps.merge.outputs.conflict == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/conflict-${{ github.run_number }}
          base: main
          title: "⚠️ 上游合并冲突 - ${{ env.DATE }}"
          body: |
            自动同步上游仓库 `CLRA-org/clra` 时出现冲突。
            请手动解决以下冲突文件后合并此 PR：
            - 检出该分支：`git checkout sync/conflict-${{ github.run_number }}`
            - 执行合并并解决冲突
            - 推送后合并 PR
            
            工作流运行：[查看详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          delete-branch: false